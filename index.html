<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker — Neil</title>
    <style>
  
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f1117; color: #e8e9f0; padding: 20px; }
    h1 { color: #6c5ce7; }
    
    /* Optimized Table Layout */
    table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9em; table-layout: auto; }
    th, td { border: 1px solid #252840; padding: 8px 12px; text-align: left; }
    th { background: #161820; color: #9294a8; text-transform: uppercase; letter-spacing: 1px; }
    
    /* Column-specific trimming */
    td:nth-child(1) { white-space: nowrap; width: 1%; } /* Date */
    td:nth-child(5) { font-weight: bold; width: 100px; } /* Status */

    /* Controls Styling */
    .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
    input, select { padding: 8px; background: #1e2030; border: 1px solid #35384e; color: white; border-radius: 4px; outline: none; }
    input:focus { border-color: #6c5ce7; }
    button { padding: 8px 16px; background: #6c5ce7; color: white; border: none; border-radius: 4px; cursor: pointer; transition: 0.3s; }
    button:hover { background: #a29bfe; }
    
    .status-applied { color: #81ecec; }
    .status-interviewing { color: #fdcb6e; }
    .status-offer { color: #55efc4; }
    .status-rejected { color: #ff7675; opacity: 0.7; }

    </style>
</head>
<body>

    <h1>Job Tracker</h1>
    
    <div id="add-job-form">
        <input type="text" id="company" placeholder="Company">
        <input type="text" id="position" placeholder="Position">
        <input type="text" id="location" placeholder="Location">
        <select id="status">
            <option value="Applied">Applied</option>
            <option value="Interviewing">Interviewing</option>
            <option value="Offer">Offer</option>
            <option value="Rejected">Rejected</option>
        </select>
        <button onclick="handleAddJob()">Add Job</button>
    </div>

    <div id="status-msg">Connecting to Google Sheets...</div>
<div class="controls">
    <span>Filter by:</span>
    <select id="filter-status" onchange="applyFilter()">
        <option value="All">All Applications</option>
        <option value="Applied">Applied</option>
        <option value="Interviewing">Interviewing</option>
        <option value="Offer">Offer</option>
        <option value="Rejected">Rejected</option>
    </select>
</div>
    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Company</th>
                <th>Position</th>
                <th>Location</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="job-table-body">
            </tbody>
    </table>

    <script>
       const G_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwa-waYH4RSD4oFHHJXt1D8B7L0nHnWfLDAHflN3_5GmJhDamso5-MenkRFLKKIrWo0/exec";
let allJobs = []; // Store full list for filtering

window.onload = loadJobs;

async function loadJobs() {
    document.getElementById('status-msg').innerText = "Syncing...";
    try {
        const response = await fetch(G_SCRIPT_URL);
        allJobs = await response.json();
        applyFilter(); // Initial render
        document.getElementById('status-msg').innerText = "✓ Sync Complete";
    } catch (e) { document.getElementById('status-msg').innerText = "Connection Error"; }
}

function applyFilter() {
    const filterValue = document.getElementById('filter-status').value;
    const filtered = filterValue === "All" 
        ? allJobs 
        : allJobs.filter(j => j.Status === filterValue);
    renderTable(filtered);
}

function formatDate(dateStr) {
    if (!dateStr) return "";
    const date = new Date(dateStr);
    if (isNaN(date)) return dateStr; // Fallback if Google sends raw string
    return date.getDate().toString().padStart(2, '0') + '/' + 
           (date.getMonth() + 1).toString().padStart(2, '0') + '/' + 
           date.getFullYear();
}

function renderTable(data) {
    const tbody = document.getElementById('job-table-body');
    tbody.innerHTML = data.map(job => `
        <tr>
            <td>${formatDate(job.Date)}</td>
            <td>${job.Company || ''}</td>
            <td>${job.Position || ''}</td>
            <td>${job.Location || ''}</td>
            <td class="status-${(job.Status || '').toLowerCase()}">${job.Status || ''}</td>
        </tr>
    `).join('');
}

async function handleAddJob() {
    const statusMsg = document.getElementById('status-msg');
    const newJob = {
        Date: new Date().toISOString(), // Standardized date for Google
        Company: document.getElementById('company').value,
        Position: document.getElementById('position').value,
        Location: document.getElementById('location').value,
        Status: document.getElementById('status').value
    };

    if (!newJob.Company || !newJob.Position) return alert("Fill required fields");

    statusMsg.innerText = "Sending to Sheet...";
    await fetch(G_SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(newJob) });
    
    // Clear inputs and refresh
    document.querySelectorAll('#add-job-form input').forEach(i => i.value = "");
    setTimeout(loadJobs, 1500);
}
    </script>
</body>
</html>
