<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker — Neil</title>
<style>
    body { font-family: 'Inter', system-ui, sans-serif; background: #0f1117; color: #e8e9f0; padding: 20px; }
    
    /* Table Optimization */
    table { width: 100%; border-collapse: collapse; table-layout: auto; margin-top: 15px; }
    th, td { 
        border: 1px solid #252840; 
        padding: 6px 10px; 
        text-align: left; 
        font-size: 13px;
    }

    /* Force columns to only be as wide as their content */
    th:nth-child(1), td:nth-child(1) { width: 80px; white-space: nowrap; } /* Date */
    th:nth-child(2), td:nth-child(2) { max-width: 150px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; } /* Company */
    th:nth-child(3), td:nth-child(3) { max-width: 180px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; } /* Position */
    th:nth-child(4), td:nth-child(4) { width: auto; } /* Location */
    th:nth-child(5), td:nth-child(5) { width: 100px; font-weight: bold; } /* Status */

    .controls { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; background: #161820; padding: 15px; border-radius: 8px; }
    input, select { padding: 6px 10px; background: #1e2030; border: 1px solid #35384e; color: white; border-radius: 4px; font-size: 13px; }
    
    /* Status Colors */
    .status-applied { color: #81ecec; }
    .status-interviewing { color: #fdcb6e; }
    .status-offer { color: #55efc4; background: rgba(85, 239, 196, 0.1); padding: 2px 5px; border-radius: 3px; }
    .status-rejected { color: #ff7675; opacity: 0.6; }
</style>
</head>
<body>

    <h1>Job Tracker</h1>
    
    <div id="add-job-form">
        <input type="text" id="company" placeholder="Company">
        <input type="text" id="position" placeholder="Position">
        <input type="text" id="location" placeholder="Location">
        <select id="status">
            <option value="Applied">Applied</option>
            <option value="Interviewing">Interviewing</option>
            <option value="Offer">Offer</option>
            <option value="Rejected">Rejected</option>
        </select>
        <button onclick="handleAddJob()">Add Job</button>
    </div>

    <div id="status-msg">Connecting to Google Sheets...</div>
<div class="controls">
    <input type="text" id="search-company" placeholder="Search Company..." oninput="applyFilter()">
    
    <select id="filter-status" onchange="applyFilter()">
        <option value="All">All Statuses</option>
        <option value="Applied">Applied</option>
        <option value="Interviewing">Interviewing</option>
        <option value="Offer">Offer</option>
        <option value="Rejected">Rejected</option>
    </select>

    <select id="filter-month" onchange="applyFilter()">
        <option value="All">All Months</option>
        <option value="0">January</option><option value="1">February</option>
        <option value="2">March</option><option value="3">April</option>
        <option value="4">May</option><option value="5">June</option>
        <option value="6">July</option><option value="7">August</option>
        <option value="8">September</option><option value="9">October</option>
        <option value="10">November</option><option value="11">December</option>
    </select>

    <select id="filter-year" onchange="applyFilter()">
        <option value="All">All Years</option>
        <option value="2024">2024</option>
        <option value="2025">2025</option>
        <option value="2026">2026</option>
    </select>
</div>
    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Company</th>
                <th>Position</th>
                <th>Location</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="job-table-body">
            </tbody>
    </table>

    <script>
       const G_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwa-waYH4RSD4oFHHJXt1D8B7L0nHnWfLDAHflN3_5GmJhDamso5-MenkRFLKKIrWo0/exec";
let allJobs = []; // Store full list for filtering

window.onload = loadJobs;

async function loadJobs() {
    document.getElementById('status-msg').innerText = "Syncing...";
    try {
        const response = await fetch(G_SCRIPT_URL);
        allJobs = await response.json();
        applyFilter(); // Initial render
        document.getElementById('status-msg').innerText = "✓ Sync Complete";
    } catch (e) { document.getElementById('status-msg').innerText = "Connection Error"; }
}

function applyFilter() {
    const statusVal = document.getElementById('filter-status').value;
    const monthVal = document.getElementById('filter-month').value;
    const yearVal = document.getElementById('filter-year').value;
    const searchVal = document.getElementById('search-company').value.toLowerCase();

    const filtered = allJobs.filter(job => {
        const jobDate = new Date(job.Date);
        
        const matchStatus = (statusVal === "All" || job.Status === statusVal);
        const matchMonth = (monthVal === "All" || jobDate.getMonth().toString() === monthVal);
        const matchYear = (yearVal === "All" || jobDate.getFullYear().toString() === yearVal);
        const matchSearch = (job.Company.toLowerCase().includes(searchVal) || job.Position.toLowerCase().includes(searchVal));

        return matchStatus && matchMonth && matchYear && matchSearch;
    });

    renderTable(filtered);
}

function formatDate(dateStr) {
    if (!dateStr) return "";
    const date = new Date(dateStr);
    if (isNaN(date)) return dateStr; // Fallback if Google sends raw string
    return date.getDate().toString().padStart(2, '0') + '/' + 
           (date.getMonth() + 1).toString().padStart(2, '0') + '/' + 
           date.getFullYear();
}

function renderTable(data) {
    const tbody = document.getElementById('job-table-body');
    tbody.innerHTML = data.map(job => `
        <tr>
            <td>${formatDate(job.Date)}</td>
            <td>${job.Company || ''}</td>
            <td>${job.Position || ''}</td>
            <td>${job.Location || ''}</td>
            <td class="status-${(job.Status || '').toLowerCase()}">${job.Status || ''}</td>
        </tr>
    `).join('');
}

async function handleAddJob() {
    const statusMsg = document.getElementById('status-msg');
    const newJob = {
        Date: new Date().toISOString(), // Standardized date for Google
        Company: document.getElementById('company').value,
        Position: document.getElementById('position').value,
        Location: document.getElementById('location').value,
        Status: document.getElementById('status').value
    };

    if (!newJob.Company || !newJob.Position) return alert("Fill required fields");

    statusMsg.innerText = "Sending to Sheet...";
    await fetch(G_SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(newJob) });
    
    // Clear inputs and refresh
    document.querySelectorAll('#add-job-form input').forEach(i => i.value = "");
    setTimeout(loadJobs, 1500);
}
    </script>
</body>
</html>
