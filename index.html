<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Hub — Neil</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; background: #f5f4f0; }
        h1 { margin: 0 0 20px; }
        button { padding: 10px 20px; cursor: pointer; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th { background: #1a1a2e; color: white; padding: 12px 16px; text-align: left; font-size: 12px; }
        td { padding: 12px 16px; border-bottom: 1px solid #eee; font-size: 14px; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fafaf8; }
        #status { margin-bottom: 16px; font-size: 14px; color: #666; }
    </style>
</head>
<body>
    <h1>Career Hub — Neil</h1>
    <div id="status">Loading...</div>
    <button onclick="loadJobs()">↻ Sync</button>
    <br><br>
    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Company</th>
                <th>Role</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbwuw06PywCJ16BNvwBzCq0dZ_6LklAO1DmJEDwDFRp_yubMc_O8lFZYyXx9m0-LGh8L2Q/exec";

        window.onload = loadJobs;

        async function loadJobs() {
            document.getElementById('status').textContent = 'Syncing...';
            try {
                const res = await fetch(URL + "?v=" + Date.now());
                const data = await res.json();
                const jobs = data.filter(j => j.Company || j.Role);
                jobs.sort((a, b) => new Date(b.Date) - new Date(a.Date));

                document.getElementById('status').textContent = jobs.length + ' applications loaded';
                document.getElementById('tbody').innerHTML = jobs.map(j => {
                    const d = new Date(j.Date);
                    const dateStr = isNaN(d) ? j.Date : d.toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'});
                    return `<tr>
                        <td>${dateStr}</td>
                        <td>${j.Company || ''}</td>
                        <td>${j.Role || ''}</td>
                        <td>${j.Status || ''}</td>
                    </tr>`;
                }).join('');
            } catch(e) {
                document.getElementById('status').textContent = 'Error: ' + e.message;
                console.error(e);
            }
        }
    </script>
</body>
</html>
