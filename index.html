<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Hub — Neil</title>
    <style>
        :root { 
            --bg: #f1f8f1; --card-bg: #ffffff; --primary: #2e7d32; --primary-light: #e8f5e9;
            --text: #000000; --text-light: #374151; --border: #c8e6c9; --accent: #f9fff9;
            --applied-bg: #ecfdf5; --applied-txt: #065f46;
            --interview-bg: #eff6ff; --interview-txt: #1e40af;
            --offer-bg: #f0fdf4; --offer-txt: #15803d;
            --rejected-bg: #fef2f2; --rejected-txt: #991b1b;
        }
        
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        h1 { font-weight: 800; margin: 10px 0 5px 0; font-size: 1.8rem; }
        .subtitle { color: var(--text-light); margin-bottom: 25px; font-size: 0.9rem; }

        /* Stats Section */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 25px; }
        .stat-card { background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
        .stat-label { font-size: 10px; color: var(--text-light); text-transform: uppercase; font-weight: 700; }
        .stat-value { font-size: 24px; font-weight: 900; color: var(--primary); margin-top: 4px; }

        /* Entry Card */
        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; display: flex; gap: 12px; flex-wrap: wrap; }
        input, select, textarea { background: var(--accent); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 8px; outline: none; font-size: 14px; flex: 1; min-width: 100%; box-sizing: border-box; }
        textarea { min-height: 60px; resize: none; }
        
        button { padding: 12px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; border: none; background: var(--primary); color: white; width: 100%; font-size: 14px; text-transform: uppercase; }
        @media (min-width: 600px) { button { width: auto; } }
        .btn-ghost { background: var(--primary-light); color: var(--primary); border: 1px solid var(--border); }

        /* Linear Table Layout */
        table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
        th { text-align: left; background: var(--primary-light); padding: 12px 15px; font-size: 11px; text-transform: uppercase; color: var(--text-light); border-bottom: 1px solid var(--border); }
        td { padding: 12px 15px; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: middle; }
        
        /* Company & Role Matching Text */
        .company-name { font-size: 14px; font-weight: 400; color: var(--text); display: block; }
        .role-name { font-size: 13px; color: var(--text-light); display: block; }
        .note-preview { font-size: 12px; color: #64748b; font-style: italic; }

        /* Status Pills */
        .pill { padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 700; border: 1px solid; display: inline-block; text-transform: uppercase; }
        .status-applied { background: var(--applied-bg); color: var(--applied-txt); border-color: #a7f3d0; }
        .status-interviewing { background: var(--interview-bg); color: var(--interview-txt); border-color: #bfdbfe; }
        .status-offer { background: var(--offer-bg); color: var(--offer-txt); border-color: #86efac; }
        .status-rejected { background: var(--rejected-bg); color: var(--rejected-txt); border-color: #fecaca; }

        .edit-btn { background: #000; color: #fff; padding: 6px 12px; border-radius: 6px; font-size: 11px; }

        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 100%; max-width: 450px; }
        label { display: block; font-size: 10px; font-weight: 700; margin: 8px 0 4px 0; color: var(--text-light); text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Career Hub</h1>
        <p class="subtitle" id="status-msg">Syncing...</p>
        
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value" id="stat-total">0</div></div>
            <div class="stat-card"><div class="stat-label">Pipeline</div><div class="stat-value" id="stat-pipeline">0</div></div>
            <div class="stat-card"><div class="stat-label">Recent</div><div class="stat-value" id="stat-week">0</div></div>
            <div class="stat-card"><div class="stat-label">Offers</div><div class="stat-value" id="stat-offers">0</div></div>
        </div>

        <div class="card">
            <input type="text" id="company" placeholder="Company Name">
            <input type="text" id="position" placeholder="Position / Role">
            <select id="status"><option>Applied</option><option>Interviewing</option><option>Offer</option><option>Rejected</option></select>
            <textarea id="notes" placeholder="Notes & Comments"></textarea>
            <button onclick="handleAddJob()" id="save-btn">Add Record</button>
        </div>

        <div class="card" style="background: transparent; border: none; padding: 0;">
            <input type="text" id="search-box" placeholder="🔍 Search Company, Role, or Notes..." oninput="applyFilter()">
            <select id="filter-month" onchange="applyFilter()" style="flex: 0.3; min-width: 80px;"><option value="All">All Months</option><option value="0">Jan</option><option value="1">Feb</option><option value="2">Mar</option><option value="3">Apr</option><option value="4">May</option><option value="5">Jun</option><option value="6">Jul</option><option value="7">Aug</option><option value="8">Sep</option><option value="9">Oct</option><option value="10">Nov</option><option value="11">Dec</option></select>
            <select id="filter-year" onchange="applyFilter()" style="flex: 0.3; min-width: 80px;"><option value="All">All Years</option><option value="2025">2025</option><option value="2026" selected>2026</option></select>
            <button class="btn-ghost" onclick="clearFilters()" style="flex: 0.2; min-width: 80px; padding: 10px;">Clear</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Application Details</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="job-table-body"></tbody>
        </table>
    </div>

    <div class="modal-overlay" id="edit-modal">
        <div class="modal-content">
            <h2 style="margin: 0; font-size: 1.2rem;">Edit Application</h2>
            <label>Date</label><input type="date" id="edit-date">
            <label>Company</label><input type="text" id="edit-company">
            <label>Position</label><input type="text" id="edit-position">
            <label>Status</label><select id="edit-status"><option>Applied</option><option>Interviewing</option><option>Offer</option><option>Rejected</option></select>
            <label>Notes</label><textarea id="edit-notes"></textarea>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button onclick="saveEdit()" style="flex: 2;">Save Changes</button>
                <button onclick="closeModal()" class="btn-ghost" style="flex: 1;">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const G_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwa-waYH4RSD4oFHHJXt1D8B7L0nHnWfLDAHflN3_5GmJhDamso5-MenkRFLKKIrWo0/exec";
        let allJobs = [];

        window.onload = loadJobs;

        async function loadJobs() {
            const msg = document.getElementById('status-msg');
            try {
                const response = await fetch(G_SCRIPT_URL);
                const data = await response.json();
                allJobs = data.filter(j => j.Company);
                updateStats();
                applyFilter();
                msg.innerText = "Showing 2026 records";
            } catch (e) { msg.innerText = "Sync Error"; }
        }

        function updateStats() {
            const now = new Date();
            const lastWeek = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
            document.getElementById('stat-total').innerText = allJobs.length;
            document.getElementById('stat-pipeline').innerText = allJobs.filter(j => ['Applied','Interviewing'].includes(j.Status)).length;
            document.getElementById('stat-offers').innerText = allJobs.filter(j => j.Status === 'Offer').length;
            document.getElementById('stat-week').innerText = allJobs.filter(j => new Date(j.Date) > lastWeek).length;
        }

        function renderTable(data) {
            const tbody = document.getElementById('job-table-body');
            tbody.innerHTML = data.sort((a,b) => new Date(b.Date) - new Date(a.Date)).map((job) => `
                <tr>
                    <td style="width: 15%; color: #6b7280; font-size: 12px;">${new Date(job.Date).toLocaleDateString('en-GB')}</td>
                    <td style="width: 55%;">
                        <span class="company-name">${job.Company}</span>
                        <span class="role-name">${job.Position || '—'}</span>
                        ${job.Notes ? `<span class="note-preview">💬 ${job.Notes}</span>` : ''}
                    </td>
                    <td style="width: 15%;"><span class="pill status-${(job.Status || 'applied').toLowerCase()}">${job.Status}</span></td>
                    <td style="width: 15%;"><button class="edit-btn" onclick="openModal(${allJobs.indexOf(job)})">Edit</button></td>
                </tr>
            `).join('');
        }

        function applyFilter() {
            const s = document.getElementById('search-box').value.toLowerCase();
            const m = document.getElementById('filter-month').value;
            const y = document.getElementById('filter-year').value;
            const filtered = allJobs.filter(j => {
                const d = new Date(j.Date);
                const matchSearch = j.Company.toLowerCase().includes(s) || (j.Position || "").toLowerCase().includes(s) || (j.Notes || "").toLowerCase().includes(s);
                const matchMonth = m === "All" || d.getMonth().toString() === m;
                const matchYear = y === "All" || d.getFullYear().toString() === y;
                return matchSearch && matchMonth && matchYear;
            });
            renderTable(filtered);
        }

        function openModal(index) {
            const job = allJobs[index];
            document.getElementById('edit-date').value = new Date(job.Date).toISOString().split('T')[0];
            document.getElementById('edit-company').value = job.Company;
            document.getElementById('edit-position').value = job.Position || '';
            document.getElementById('edit-status').value = job.Status || 'Applied';
            document.getElementById('edit-notes').value = job.Notes || '';
            document.getElementById('edit-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('edit-modal').style.display = 'none'; }

        async function saveEdit() {
            const btn = document.querySelector('.modal-content button');
            btn.innerText = "Saving...";
            const updated = {
                Date: new Date(document.getElementById('edit-date').value).toISOString(),
                Company: document.getElementById('edit-company').value,
                Position: document.getElementById('edit-position').value,
                Status: document.getElementById('edit-status').value,
                Notes: document.getElementById('edit-notes').value
            };
            await fetch(G_SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(updated) });
            closeModal();
            loadJobs();
        }

        async function handleAddJob() {
            const btn = document.getElementById('save-btn');
            btn.innerText = "Adding...";
            const newJob = {
                Date: new Date().toISOString(),
                Company: document.getElementById('company').value,
                Position: document.getElementById('position').value,
                Status: document.getElementById('status').value,
                Notes: document.getElementById('notes').value
            };
            await fetch(G_SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(newJob) });
            document.querySelectorAll('.card input, .card textarea').forEach(i => i.value = "");
            btn.innerText = "Add Record";
            loadJobs();
        }

        function clearFilters() {
            document.getElementById('search-box').value = "";
            document.getElementById('filter-month').value = "All";
            document.getElementById('filter-year').value = "2026";
            applyFilter();
        }
    </script>
</body>
</html>
