<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Career Hub — Neil</title>
    <style>
        :root { 
            --bg: #ffffff; --card-bg: #f8fafc; --primary: #0f172a; --accent: #2563eb;
            --border: #e2e8f0; --text-main: #1e293b; --text-sub: #64748b;
            --applied-bg: #dbeafe; --applied-txt: #1e40af;
            --progress-bg: #fef3c7; --progress-txt: #92400e;
            --rejected-bg: #fee2e2; --rejected-txt: #991b1b;
            --offer-bg: #dcfce7; --offer-txt: #166534;
        }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); padding: 15px; margin: 0; line-height: 1.5; overflow-x: hidden; }
        .container { max-width: 1200px; margin: 0 auto; width: 100%; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        h1 { font-size: 1.8rem; font-weight: 900; margin: 0; letter-spacing: -1px; color: var(--primary); }
        
        /* Stats Grid - Responsive */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--card-bg); padding: 15px; border-radius: 14px; border: 1px solid var(--border); }
        .stat-label { font-size: 10px; color: var(--accent); text-transform: uppercase; font-weight: 800; letter-spacing: 0.5px; display: block; margin-bottom: 5px; }
        .stat-value { font-size: 24px; font-weight: 900; color: var(--primary); }

        /* Control Panel - Responsive */
        .control-panel { 
            display: flex; flex-direction: column; gap: 10px; background: #f1f5f9; padding: 15px; border-radius: 16px; margin-bottom: 20px; 
        }
        @media (min-width: 768px) {
            .control-panel { display: grid; grid-template-columns: 1.5fr 1fr 0.8fr 0.8fr auto; }
        }

        .search-input, .filter-select { padding: 12px; border-radius: 12px; border: 1px solid var(--border); font-size: 14px; outline: none; background: white; width: 100%; box-sizing: border-box; }

        .btn-main { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 12px; cursor: pointer; font-weight: 700; font-size: 14px; width: 100%; }
        @media (min-width: 768px) { .btn-main { width: auto; } }

        /* Scrollable Table Fix */
        .table-wrapper { background: white; border-radius: 16px; border: 1px solid var(--border); overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; } /* Ensures table doesn't squish too much */
        
        th { text-align: left; background: var(--primary); padding: 15px; font-size: 10px; color: #ffffff; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; white-space: nowrap; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
        
        .co-name { font-weight: 800; font-size: 15px; color: var(--primary); display: block; }
        .role-name { font-size: 13px; color: var(--text-sub); }

        /* Status Pills */
        .pill { padding: 6px 12px; border-radius: 10px; font-size: 10px; font-weight: 800; display: inline-flex; align-items: center; gap: 6px; text-transform: uppercase; white-space: nowrap; }
        .pill::before { content: ''; width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
        
        .status-applied { background: var(--applied-bg); color: var(--applied-txt); }
        .status-applied::before { background: var(--applied-txt); }
        .status-in-progress { background: var(--progress-bg); color: var(--progress-txt); }
        .status-in-progress::before { background: var(--progress-txt); }
        .status-rejected { background: var(--rejected-bg); color: var(--rejected-txt); }
        .status-rejected::before { background: var(--rejected-txt); }
        .status-offer { background: var(--offer-bg); color: var(--offer-txt); }
        .status-offer::before { background: var(--offer-txt); }

        /* Modals */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.8); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 15px; box-sizing: border-box; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 450px; }
        
        #add-form-container { display: none; background: #f8fafc; padding: 20px; border-radius: 16px; border: 2px dashed var(--border); margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>Career Hub</h1>
                <p style="color: var(--text-sub); font-size: 13px; margin: 2px 0 0 0;">Application Tracker</p>
            </div>
            <button class="btn-main" onclick="toggleForm()" style="background: var(--accent); width: auto;">+ New</button>
        </header>

        <div class="stats-grid">
            <div class="stat-card"><span class="stat-label">Total</span><div class="stat-value" id="stat-total">0</div></div>
            <div class="stat-card"><span class="stat-label">Applied</span><div class="stat-value" id="stat-applied" style="color: var(--applied-txt);">0</div></div>
            <div class="stat-card"><span class="stat-label">In Progress</span><div class="stat-value" id="stat-progress" style="color: var(--progress-txt);">0</div></div>
            <div class="stat-card"><span class="stat-label">Rejected</span><div class="stat-value" id="stat-rejected" style="color: var(--rejected-txt);">0</div></div>
            <div class="stat-card"><span class="stat-label">Offers</span><div class="stat-value" id="stat-offers" style="color: var(--offer-txt);">0</div></div>
        </div>

        <div class="control-panel">
            <input type="text" id="search-box" class="search-input" placeholder="Search..." onkeyup="renderUI()">
            <select id="filter-status" class="filter-select" onchange="renderUI()">
                <option value="all">Status: All</option>
                <option>Applied</option>
                <option>In Progress</option>
                <option>Offer</option>
                <option>Rejected</option>
            </select>
            <select id="filter-month" class="filter-select" onchange="renderUI()">
                <option value="all">Month: All</option>
                <option value="0">January</option><option value="1">February</option>
                <option value="2">March</option><option value="3">April</option>
                <option value="4">May</option><option value="5">June</option>
                <option value="6">July</option><option value="7">August</option>
                <option value="8">September</option><option value="9">October</option>
                <option value="10">November</option><option value="11">December</option>
            </select>
            <select id="filter-year" class="filter-select" onchange="renderUI()">
                <option value="all">Year: All</option>
                <option value="2025">2025</option>
                <option value="2026">2026</option>
            </select>
            <button class="btn-main" onclick="loadJobs()">Sync</button>
        </div>

        <div id="add-form-container">
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <input type="text" id="company" class="search-input" placeholder="Company">
                <input type="text" id="role" class="search-input" placeholder="Role">
                <select id="status" class="filter-select">
                    <option>Applied</option>
                    <option>In Progress</option>
                    <option>Offer</option>
                    <option>Rejected</option>
                </select>
                <button class="btn-main" onclick="handleSyncJob()" style="background: var(--accent);">Submit</button>
            </div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Date Applied</th>
                        <th>Company & Role</th>
                        <th>Status</th>
                        <th style="text-align: right;">Action</th>
                    </tr>
                </thead>
                <tbody id="job-table-body"></tbody>
            </table>
        </div>
    </div>

    <div class="modal-overlay" id="edit-modal">
        <div class="modal-content">
            <h2 style="margin-top:0; font-size: 20px;">Update Entry</h2>
            <div style="display:flex; flex-direction:column; gap:15px;">
                <div>
                    <label class="stat-label">Company</label>
                    <input type="text" id="edit-company" class="search-input">
                </div>
                <div>
                    <label class="stat-label">Role</label>
                    <input type="text" id="edit-role" class="search-input">
                </div>
                <div>
                    <label class="stat-label">Status</label>
                    <select id="edit-status" class="filter-select">
                        <option>Applied</option>
                        <option>In Progress</option>
                        <option>Offer</option>
                        <option>Rejected</option>
                    </select>
                </div>
                <button class="btn-main" onclick="saveSyncEdit()" style="background: var(--accent);">Save</button>
                <button class="btn-main" onclick="closeModal()" style="background: transparent; color: var(--text-sub);">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const G_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwuw06PywCJ16BNvwBzCq0dZ_6LklAO1DmJEDwDFRp_yubMc_O8lFZYyXx9m0-LGh8L2Q/exec";
        let allJobs = [];
        let selectedJob = null;

        window.onload = loadJobs;

        async function loadJobs() {
            try {
                const res = await fetch(G_SCRIPT_URL + "?v=" + Date.now());
                allJobs = await res.json();
                allJobs.sort((a, b) => new Date(b.Date) - new Date(a.Date));
                renderUI();
            } catch (e) { console.error("Sync Error", e); }
        }

        function renderUI() {
            const tbody = document.getElementById('job-table-body');
            const searchQ = document.getElementById('search-box').value.toLowerCase();
            const sFilter = document.getElementById('filter-status').value;
            const mFilter = document.getElementById('filter-month').value;
            const yFilter = document.getElementById('filter-year').value;
            
            tbody.innerHTML = '';
            let counts = { Total: 0, Applied: 0, Progress: 0, Rejected: 0, Offer: 0 };

            allJobs.forEach((job, idx) => {
                const jDate = new Date(job.Date);
                const status = (job.Status || 'Applied').trim();

                const matchesSearch = (job.Company || "").toLowerCase().includes(searchQ) || (job.Role || "").toLowerCase().includes(searchQ);
                const matchesStatus = sFilter === "all" || status === sFilter;
                const matchesMonth = mFilter === "all" || jDate.getMonth().toString() === mFilter;
                const matchesYear = yFilter === "all" || jDate.getFullYear().toString() === yFilter;

                if (matchesSearch && matchesStatus && matchesMonth && matchesYear) {
                    counts.Total++;
                    if (status === 'Applied') counts.Applied++;
                    else if (status === 'In Progress') counts.Progress++;
                    else if (status === 'Rejected') counts.Rejected++;
                    else if (status === 'Offer') counts.Offer++;

                    const row = `<tr>
                        <td class="date-cell" style="white-space: nowrap;">${jDate.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' })}</td>
                        <td>
                            <span class="co-name">${job.Company}</span>
                            <span class="role-name">${job.Role}</span>
                        </td>
                        <td><span class="pill status-${status.toLowerCase().replace(/\s+/g, '-')}">${status}</span></td>
                        <td style="text-align: right;"><button class="btn-main" style="width: auto; padding: 6px 12px; font-size: 11px;" onclick="openEdit(${idx})">Modify</button></td>
                    </tr>`;
                    tbody.innerHTML += row;
                }
            });

            document.getElementById('stat-total').innerText = counts.Total;
            document.getElementById('stat-applied').innerText = counts.Applied;
            document.getElementById('stat-progress').innerText = counts.Progress;
            document.getElementById('stat-rejected').innerText = counts.Rejected;
            document.getElementById('stat-offers').innerText = counts.Offer;
        }

        function toggleForm() {
            const f = document.getElementById('add-form-container');
            f.style.display = f.style.display === 'block' ? 'none' : 'block';
        }

        function openEdit(idx) {
            selectedJob = allJobs[idx];
            document.getElementById('edit-company').value = selectedJob.Company;
            document.getElementById('edit-role').value = selectedJob.Role;
            document.getElementById('edit-status').value = selectedJob.Status || 'Applied';
            document.getElementById('edit-modal').style.display = 'flex';
        }

        async function saveSyncEdit() {
            selectedJob.Company = document.getElementById('edit-company').value;
            selectedJob.Role = document.getElementById('edit-role').value;
            selectedJob.Status = document.getElementById('edit-status').value;
            await fetch(G_SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(selectedJob) });
            closeModal();
            loadJobs();
        }

        async function handleSyncJob() {
            const newJob = { Date: new Date().toISOString(), Company: document.getElementById('company').value, Role: document.getElementById('role').value, Status: document.getElementById('status').value, Notes: "" };
            await fetch(G_SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(newJob) });
            toggleForm();
            loadJobs();
        }

        function closeModal() { document.getElementById('edit-modal').style.display = 'none'; }
    </script>
</body>
</html>
