<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Career Hub — Neil</title>
    <style>
        :root { 
            --bg: #f1f8f1; --card-bg: #ffffff; --primary: #2e7d32; --primary-light: #e8f5e9;
            --text: #000000; --text-light: #374151; --border: #c8e6c9; --accent: #f9fff9;
            --applied-bg: #ecfdf5; --applied-txt: #065f46;
            --interview-bg: #eff6ff; --interview-txt: #1e40af;
            --offer-bg: #f0fdf4; --offer-txt: #15803d;
            --rejected-bg: #fef2f2; --rejected-txt: #991b1b;
        }
        
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { font-weight: 800; margin: 10px 0 5px 0; font-size: 1.8rem; }
        .subtitle { color: var(--text-light); margin-bottom: 20px; font-size: 0.9rem; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
        .stat-label { font-size: 10px; color: var(--text-light); text-transform: uppercase; font-weight: 700; }
        .stat-value { font-size: 24px; font-weight: 900; color: var(--primary); margin-top: 4px; }

        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        input, select, textarea { background: var(--accent); border: 1px solid var(--border); padding: 12px; border-radius: 8px; outline: none; font-size: 15px; flex: 1; min-width: calc(33% - 10px); box-sizing: border-box; font-family: inherit; }
        textarea { min-width: 100%; min-height: 60px; }
        
        button { padding: 14px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; border: none; background: var(--primary); color: white; font-size: 13px; text-transform: uppercase; transition: opacity 0.2s; }
        button:active { opacity: 0.7; }
        .btn-ghost { background: var(--primary-light); color: var(--primary); border: 1px solid var(--border); }

        .table-wrapper { width: 100%; overflow-x: auto; background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border); -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; min-width: 950px; table-layout: fixed; }
        th { text-align: left; background: var(--primary-light); padding: 12px 15px; font-size: 10px; text-transform: uppercase; border-bottom: 1px solid var(--border); color: var(--text-light); }
        td { padding: 12px 15px; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: middle; word-wrap: break-word; }
        
        .resume-badge { font-size: 9px; font-weight: 800; padding: 2px 5px; border-radius: 4px; text-transform: uppercase; margin-left: 6px; border: 1px solid; }
        .badge-word { background: #e0f2fe; color: #0369a1; border-color: #bae6fd; }
        .badge-canva { background: #f5f3ff; color: #6d28d9; border-color: #ddd6fe; }

        .pill { padding: 5px 12px; border-radius: 6px; font-size: 10px; font-weight: 700; border: 1px solid; display: inline-block; text-transform: uppercase; }
        .status-applied { background: var(--applied-bg); color: var(--applied-txt); border-color: #a7f3d0; }
        .status-interviewing { background: var(--interview-bg); color: var(--interview-txt); border-color: #bfdbfe; }
        .status-offer { background: var(--offer-bg); color: var(--offer-txt); border-color: #86efac; }
        .status-rejected { background: var(--rejected-bg); color: var(--rejected-txt); border-color: #fecaca; }

        .edit-btn { background: #000; color: #fff; padding: 8px 12px; border-radius: 6px; font-size: 10px; cursor: pointer; font-weight: 700; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(3px); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Career Hub</h1>
        <p class="subtitle" id="status-msg">Connecting to Neil's Sheet...</p>
        
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value" id="stat-total">0</div></div>
            <div class="stat-card"><div class="stat-label">Pipeline</div><div class="stat-value" id="stat-pipeline">0</div></div>
            <div class="stat-card"><div class="stat-label">Offers</div><div class="stat-value" id="stat-offers">0</div></div>
        </div>

        <div class="card">
            <input type="text" id="company" placeholder="Company Name">
            <input type="text" id="role" placeholder="Role">
            <input type="text" id="location" placeholder="Location">
            <input type="text" id="salary" placeholder="Salary Range">
            <select id="status"><option>Applied</option><option>Interviewing</option><option>Offer</option><option>Rejected</option></select>
            <textarea id="notes" placeholder="Notes..."></textarea>
            <button onclick="handleSyncJob()" id="save-btn">Add & Sync</button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th style="width: 90px;">Date</th>
                        <th>Company & Info</th>
                        <th>Role</th>
                        <th style="width: 120px;">Salary Range</th>
                        <th style="width: 110px;">Status</th>
                        <th style="width: 70px;">Action</th>
                    </tr>
                </thead>
                <tbody id="job-table-body"></tbody>
            </table>
        </div>
    </div>

    <div class="modal-overlay" id="edit-modal">
        <div class="modal-content">
            <h3 style="margin-top:0">Update Application</h3>
            <label style="font-size:10px; font-weight:700; text-transform: uppercase;">Status</label>
            <select id="edit-status"><option>Applied</option><option>Interviewing</option><option>Offer</option><option>Rejected</option></select>
            <label style="font-size:10px; font-weight:700; text-transform: uppercase; margin-top:10px; display:block;">Notes</label>
            <textarea id="edit-notes"></textarea>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button onclick="saveSyncEdit()" style="flex: 2;">Save to Sheet</button>
                <button onclick="closeModal()" class="btn-ghost" style="flex: 1;">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const G_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwuw06PywCJ16BNvwBzCq0dZ_6LklAO1DmJEDwDFRp_yubMc_O8lFZYyXx9m0-LGh8L2Q/exec";
        let allJobs = [];
        let currentJobIndex = null;
        const RESUME_CUTOFF = new Date("2026-03-03");

        window.onload = loadJobs;

        async function loadJobs() {
            try {
                const response = await fetch(G_SCRIPT_URL);
                allJobs = await response.json();
                renderTable();
                document.getElementById('status-msg').innerText = "Dashboard Live — Synced with Google Sheet";
            } catch (e) { document.getElementById('status-msg').innerText = "Connection Error"; }
        }

        function renderTable() {
            const tbody = document.getElementById('job-table-body');
            document.getElementById('stat-total').innerText = allJobs.length;
            document.getElementById('stat-pipeline').innerText = allJobs.filter(j => ['Applied','Interviewing'].includes(j.Status)).length;
            document.getElementById('stat-offers').innerText = allJobs.filter(j => j.Status === 'Offer').length;

            tbody.innerHTML = allJobs.sort((a,b) => new Date(b.Date) - new Date(a.Date)).map((job, idx) => {
                const d = new Date(job.Date);
                const badge = d >= RESUME_CUTOFF ? '<span class="resume-badge badge-word">Word</span>' : '<span class="resume-badge badge-canva">Canva</span>';
                
                return `
                    <tr>
                        <td style="font-size: 11px; color: #888;">${d.toLocaleDateString('en-GB')}</td>
                        <td>
                            <div style="display:flex; align-items:center;"><strong>${job.Company}</strong> ${badge}</div>
                            <span style="font-size:12px; color:#666;">📍 ${job.Location || 'N/A'}</span>
                            ${job.Notes ? `<span style="font-size:11px; color:#999; font-style:italic; display:block;">💬 ${job.Notes}</span>` : ''}
                        </td>
                        <td>${job.Role || '—'}</td>
                        <td style="font-size: 12px; color:#1a5d1a; font-weight:700;">${job["Salary range"] || '—'}</td>
                        <td><span class="pill status-${(job.Status || 'applied').toLowerCase()}">${job.Status}</span></td>
                        <td><button class="edit-btn" onclick="openEdit(${idx})">Edit</button></td>
                    </tr>
                `;
            }).join('');
        }

        async function handleSyncJob() {
            const btn = document.getElementById('save-btn');
            btn.innerText = "Syncing...";
            const newJob = {
                Date: new Date().toISOString(),
                Company: document.getElementById('company').value,
                Role: document.getElementById('role').value,
                Location: document.getElementById('location').value,
                Status: document.getElementById('status').value,
                Notes: document.getElementById('notes').value,
                "Salary range": document.getElementById('salary').value
            };
            await fetch(G_SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(newJob) });
            document.querySelectorAll('input, textarea').forEach(i => i.value = "");
            btn.innerText = "Add & Sync";
            loadJobs();
        }

        function openEdit(idx) {
            currentJobIndex = idx;
            const sorted = allJobs.sort((a,b) => new Date(b.Date) - new Date(a.Date));
            const job = sorted[idx];
            document.getElementById('edit-status').value = job.Status;
            document.getElementById('edit-notes').value = job.Notes || "";
            document.getElementById('edit-modal').style.display = 'flex';
        }

        async function saveSyncEdit() {
            const sorted = allJobs.sort((a,b) => new Date(b.Date) - new Date(a.Date));
            const job = sorted[currentJobIndex];
            job.Status = document.getElementById('edit-status').value;
            job.Notes = document.getElementById('edit-notes').value;
            await fetch(G_SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(job) });
            closeModal();
            loadJobs();
        }

        function closeModal() { document.getElementById('edit-modal').style.display = 'none'; }
    </script>
</body>
</html>
