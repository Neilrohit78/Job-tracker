<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Hub — Neil</title>
    <style>
        :root { 
            --bg: #f0f2f5; --card-bg: #ffffff; --primary: #6c5ce7; --text: #1e293b; 
            --text-light: #64748b; --border: #e2e8f0; --accent: #f8fafc;
        }
        
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 40px 20px; margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        h1 { font-weight: 800; color: #0f172a; margin-bottom: 8px; }
        .subtitle { color: var(--text-light); margin-bottom: 30px; font-size: 14px; }

        /* Dashboard Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card-bg); padding: 20px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .stat-label { font-size: 12px; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
        .stat-value { font-size: 28px; font-weight: 800; color: var(--primary); margin-top: 5px; }

        /* Forms & Cards */
        .card { background: var(--card-bg); padding: 24px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 24px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        input, select { background: var(--accent); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 10px; outline: none; font-size: 14px; flex: 1; min-width: 140px; }
        input:focus { border-color: var(--primary); background: #fff; }

        button { padding: 12px 24px; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; transition: 0.2s; background: var(--primary); color: white; }
        .btn-ghost { background: #f1f5f9; color: var(--text); }

        /* Table */
        .table-wrapper { border-radius: 16px; border: 1px solid var(--border); overflow-x: auto; background: var(--card-bg); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; color: var(--text-light); text-transform: uppercase; font-size: 11px; padding: 16px; text-align: left; }
        td { padding: 16px; border-bottom: 1px solid var(--border); font-size: 14px; white-space: nowrap; }

        /* Pills */
        .pill { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; border: 1px solid; }
        .status-applied { color: #2563eb; background: #eff6ff; border-color: #dbeafe; }
        .status-interviewing { color: #d97706; background: #fffbeb; border-color: #fef3c7; }
        .status-offer { color: #059669; background: #ecfdf5; border-color: #d1fae5; }
        .status-rejected { color: #64748b; background: #f8fafc; border-color: #f1f5f9; }

        /* Modal */
        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content { background: white; padding: 40px; border-radius: 24px; width: 90%; max-width: 500px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        
        @media (max-width: 768px) { .stats-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>Career Hub</h1>
        <p class="subtitle" id="status-msg">Initializing Dashboard...</p>
        
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-label">Total Applied</div><div class="stat-value" id="stat-total">0</div></div>
            <div class="stat-card"><div class="stat-label">In Pipeline</div><div class="stat-value" id="stat-pipeline" style="color: #d97706;">0</div></div>
            <div class="stat-card"><div class="stat-label">Added This Week</div><div class="stat-value" id="stat-week" style="color: #2563eb;">0</div></div>
            <div class="stat-card"><div class="stat-label">Offers</div><div class="stat-value" id="stat-offers" style="color: #059669;">0</div></div>
        </div>

        <div class="card">
            <input type="text" id="company" placeholder="Company Name">
            <input type="text" id="position" placeholder="Role">
            <input type="text" id="location" placeholder="Location">
            <input type="text" id="source" placeholder="Link (URL)">
            <select id="status"><option>Applied</option><option>Interviewing</option><option>Offer</option><option>Rejected</option></select>
            <button onclick="handleAddJob()" id="save-btn">Save Entry</button>
        </div>

        <div class="card" style="background: transparent; box-shadow: none; padding-left: 0;">
            <input type="text" id="search-box" placeholder="🔍 Filter by company or role..." oninput="applyFilter()">
            <select id="filter-month" onchange="applyFilter()" style="max-width: 150px;">
                <option value="All">All Months</option>
                <option value="0">Jan</option><option value="1">Feb</option><option value="2">Mar</option><option value="3">Apr</option><option value="4">May</option><option value="5">Jun</option><option value="6">Jul</option><option value="7">Aug</option><option value="8">Sep</option><option value="9">Oct</option><option value="10">Nov</option><option value="11">Dec</option>
            </select>
            <button class="btn-ghost" onclick="clearFilters()">Reset</button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead><tr><th style="width: 110px;">Date</th><th>Company</th><th>Position</th><th>Status</th><th style="width: 100px;">Actions</th></tr></thead>
                <tbody id="job-table-body"></tbody>
            </table>
        </div>
    </div>

    <div class="modal-overlay" id="edit-modal">
        <div class="modal-content">
            <h2>Edit Application</h2>
            <div style="display: flex; flex-direction: column; gap: 15px;">
                <input type="text" id="edit-company"><input type="text" id="edit-position">
                <input type="text" id="edit-location"><input type="text" id="edit-source">
                <select id="edit-status"><option>Applied</option><option>Interviewing</option><option>Offer</option><option>Rejected</option></select>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button onclick="saveEdit()" style="flex: 2;">Update Record</button>
                    <button onclick="closeModal()" class="btn-ghost" style="flex: 1;">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const G_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwa-waYH4RSD4oFHHJXt1D8B7L0nHnWfLDAHflN3_5GmJhDamso5-MenkRFLKKIrWo0/exec";
        let allJobs = [];

        window.onload = loadJobs;

        async function loadJobs() {
            const msg = document.getElementById('status-msg');
            msg.innerText = "⏳ Syncing with Google Cloud...";
            try {
                const response = await fetch(G_SCRIPT_URL);
                const rawData = await response.json();
                // Safety filter to remove empty rows
                allJobs = rawData.filter(j => j.Company && j.Company.trim() !== "");
                updateStats();
                applyFilter();
                msg.innerText = "✓ Dashboard Ready";
            } catch (e) { 
                console.error(e);
                msg.innerText = "❌ Connection Failed. Check Console."; 
            }
        }

        function updateStats() {
            const now = new Date();
            const oneWeekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
            
            document.getElementById('stat-total').innerText = allJobs.length;
            document.getElementById('stat-pipeline').innerText = allJobs.filter(j => j.Status === 'Interviewing' || j.Status === 'Applied').length;
            document.getElementById('stat-offers').innerText = allJobs.filter(j => j.Status === 'Offer').length;
            
            const weekCount = allJobs.filter(j => {
                const d = new Date(j.Date);
                return !isNaN(d) && d > oneWeekAgo;
            }).length;
            document.getElementById('stat-week').innerText = weekCount;
        }

        function renderTable(data) {
            const tbody = document.getElementById('job-table-body');
            tbody.innerHTML = data.sort((a,b) => new Date(b.Date) - new Date(a.Date)).map((job, index) => `
                <tr>
                    <td>${formatDate(job.Date)}</td>
                    <td><strong>${job.Company}</strong></td>
                    <td>${job.Position}</td>
                    <td><span class="pill status-${(job.Status || '').toLowerCase()}">${job.Status}</span></td>
                    <td><button onclick="openModal(${index})" style="background:#f1f5f9; color:#475569; padding: 5px 10px; font-size:12px; border-radius:4px; border:none; cursor:pointer;">Edit</button></td>
                </tr>
            `).join('');
        }

        function applyFilter() {
            const searchVal = document.getElementById('search-box').value.toLowerCase();
            const monthVal = document.getElementById('filter-month').value;
            const filtered = allJobs.filter(j => {
                const d = new Date(j.Date);
                const matchSearch = (j.Company || "").toLowerCase().includes(searchVal) || (j.Position || "").toLowerCase().includes(searchVal);
                const matchMonth = monthVal === "All" || (!isNaN(d) && d.getMonth().toString() === monthVal);
                return matchSearch && matchMonth;
            });
            renderTable(filtered);
        }

        function formatDate(dateStr) {
            const d = new Date(dateStr);
            return isNaN(d) ? "—" : d.toLocaleDateString('en-GB');
        }

        let currentEditIndex = null;
        function openModal(index) {
            currentEditIndex = index;
            const job = allJobs[index];
            document.getElementById('edit-company').value = job.Company || '';
            document.getElementById('edit-position').value = job.Position || '';
            document.getElementById('edit-location').value = job.Location || '';
            document.getElementById('edit-source').value = job.Source || '';
            document.getElementById('edit-status').value = job.Status || 'Applied';
            document.getElementById('edit-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('edit-modal').style.display = 'none'; }

        async function saveEdit() {
            const btn = document.querySelector('.modal-content button');
            btn.innerText = "Updating...";
            const updatedJob = {
                Date: new Date().toISOString(),
                Company: document.getElementById('edit-company').value,
                Position: document.getElementById('edit-position').value,
                Location: document.getElementById('edit-location').value,
                Status: document.getElementById('edit-status').value,
                Source: document.getElementById('edit-source').value
            };
            await fetch(G_SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(updatedJob) });
            closeModal();
            loadJobs();
        }

        async function handleAddJob() {
            const btn = document.getElementById('save-btn');
            btn.innerText = "Adding...";
            const newJob = {
                Date: new Date().toISOString(),
                Company: document.getElementById('company').value,
                Position: document.getElementById('position').value,
                Location: document.getElementById('location').value,
                Status: document.getElementById('status').value,
                Source: document.getElementById('source').value
            };
            if (!newJob.Company) return alert("Company Required");
            await fetch(G_SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(newJob) });
            clearFilters();
            btn.innerText = "Save Entry";
            loadJobs();
        }

        function clearFilters() {
            document.querySelectorAll('input').forEach(i => i.value = "");
            document.getElementById('filter-month').value = "All";
            applyFilter();
        }
    </script>
</body>
</html>
