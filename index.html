<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Hub</title>
    <style>
        :root { 
            --bg: #f1f8f1; --card-bg: #ffffff; --primary: #2e7d32; --border: #c8e6c9;
            --applied-bg: #e0f2fe; --applied-txt: #0369a1;
            --progress-bg: #fef3c7; --progress-txt: #92400e;
            --rejected-bg: #fee2e2; --rejected-txt: #991b1b;
            --offer-bg: #dcfce7; --offer-txt: #15803d;
        }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); padding: 15px; margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 20px; }
        .action-bar { display: flex; gap: 10px; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 12px; }
        .btn-ghost { background: white; color: var(--primary); border: 1px solid var(--border); padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 12px; }

        /* Updated Dashboard */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .stat-label { font-size: 10px; color: #666; text-transform: uppercase; font-weight: 800; }
        .stat-value { font-size: 22px; font-weight: 900; color: #333; margin-top: 5px; }

        /* Status Colors */
        .pill { padding: 5px 12px; border-radius: 6px; font-size: 10px; font-weight: 700; text-transform: uppercase; display: inline-block; }
        .status-applied { background: var(--applied-bg); color: var(--applied-txt); }
        .status-in-progress { background: var(--progress-bg); color: var(--progress-txt); }
        .status-rejected { background: var(--rejected-bg); color: var(--rejected-txt); }
        .status-offer { background: var(--offer-bg); color: var(--offer-txt); }

        #add-form-container { display: none; background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        .form-grid { display: flex; gap: 10px; flex-wrap: wrap; }
        input, select, textarea { border: 1px solid var(--border); padding: 10px; border-radius: 6px; flex: 1; min-width: 200px; }
        
        .table-wrapper { overflow-x: auto; background: white; border-radius: 12px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { text-align: left; background: #f9fafb; padding: 12px; font-size: 11px; color: #666; border-bottom: 1px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 500px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Career Hub</h1>
            <div class="action-bar">
                <button class="btn-main" onclick="toggleForm()">+ New App</button>
                <button class="btn-ghost" onclick="loadJobs()">Refresh</button>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value" id="stat-total">0</div></div>
            <div class="stat-card"><div class="stat-label">Applied</div><div class="stat-value" id="stat-applied">0</div></div>
            <div class="stat-card"><div class="stat-label">In Progress</div><div class="stat-value" id="stat-progress">0</div></div>
            <div class="stat-card"><div class="stat-label">Rejected</div><div class="stat-value" id="stat-rejected">0</div></div>
            <div class="stat-card"><div class="stat-label">Offers</div><div class="stat-value" id="stat-offers">0</div></div>
        </div>

        <div id="add-form-container">
            <div class="form-grid">
                <input type="text" id="company" placeholder="Company">
                <input type="text" id="role" placeholder="Role">
                <select id="status">
                    <option>Applied</option>
                    <option>In Progress</option>
                    <option>Offer</option>
                    <option>Rejected</option>
                </select>
                <button class="btn-main" onclick="handleSyncJob()">Submit</button>
            </div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Company</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="job-table-body"></tbody>
            </table>
        </div>
    </div>

    <div class="modal-overlay" id="edit-modal">
        <div class="modal-content">
            <h3>Edit Application</h3>
            <div style="display:flex; flex-direction:column; gap:15px;">
                <input type="text" id="edit-company">
                <input type="text" id="edit-role">
                <select id="edit-status">
                    <option>Applied</option>
                    <option>In Progress</option>
                    <option>Offer</option>
                    <option>Rejected</option>
                </select>
                <textarea id="edit-notes" placeholder="Notes"></textarea>
                <button class="btn-main" onclick="saveSyncEdit()">Save Changes</button>
                <button class="btn-ghost" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const G_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwuw06PywCJ16BNvwBzCq0dZ_6LklAO1DmJEDwDFRp_yubMc_O8lFZYyXx9m0-LGh8L2Q/exec";
        let allJobs = [];
        let selectedJob = null;

        window.onload = loadJobs;

        async function loadJobs() {
            try {
                const res = await fetch(G_SCRIPT_URL + "?v=" + Date.now());
                allJobs = await res.json();
                renderUI();
            } catch (e) { console.error("Load failed", e); }
        }

        function renderUI() {
            const tbody = document.getElementById('job-table-body');
            tbody.innerHTML = '';
            
            let counts = { Total: 0, Applied: 0, Progress: 0, Rejected: 0, Offer: 0 };

            allJobs.forEach((job, idx) => {
                counts.Total++;
                const status = (job.Status || 'Applied').trim();
                if (status === 'Applied') counts.Applied++;
                else if (status === 'In Progress') counts.Progress++;
                else if (status === 'Rejected') counts.Rejected++;
                else if (status === 'Offer') counts.Offer++;

                const row = `<tr>
                    <td>${new Date(job.Date).toLocaleDateString()}</td>
                    <td>${job.Company}</td>
                    <td>${job.Role}</td>
                    <td><span class="pill status-${status.toLowerCase().replace(' ', '-')}">${status}</span></td>
                    <td><button class="btn-ghost" onclick="openEdit(${idx})">Edit</button></td>
                </tr>`;
                tbody.innerHTML += row;
            });

            document.getElementById('stat-total').innerText = counts.Total;
            document.getElementById('stat-applied').innerText = counts.Applied;
            document.getElementById('stat-progress').innerText = counts.Progress;
            document.getElementById('stat-rejected').innerText = counts.Rejected;
            document.getElementById('stat-offers').innerText = counts.Offer;
        }

        function toggleForm() {
            const f = document.getElementById('add-form-container');
            f.style.display = f.style.display === 'block' ? 'none' : 'block';
        }

        function openEdit(idx) {
            selectedJob = allJobs[idx];
            document.getElementById('edit-company').value = selectedJob.Company;
            document.getElementById('edit-role').value = selectedJob.Role;
            document.getElementById('edit-status').value = selectedJob.Status || 'Applied';
            document.getElementById('edit-notes').value = selectedJob.Notes || '';
            document.getElementById('edit-modal').style.display = 'flex';
        }

        async function saveSyncEdit() {
            selectedJob.Company = document.getElementById('edit-company').value;
            selectedJob.Role = document.getElementById('edit-role').value;
            selectedJob.Status = document.getElementById('edit-status').value;
            selectedJob.Notes = document.getElementById('edit-notes').value;

            await fetch(G_SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(selectedJob) });
            closeModal();
            loadJobs();
        }

        async function handleSyncJob() {
            const newJob = {
                Date: new Date().toISOString(),
                Company: document.getElementById('company').value,
                Role: document.getElementById('role').value,
                Status: document.getElementById('status').value,
                Notes: ""
            };
            await fetch(G_SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(newJob) });
            toggleForm();
            loadJobs();
        }

        function closeModal() { document.getElementById('edit-modal').style.display = 'none'; }
    </script>
</body>
</html>
