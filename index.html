<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker — Neil</title>
    <style>
        body { font-family: sans-serif; background: #0f1117; color: #e8e9f0; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #252840; padding: 12px; text-align: left; }
        th { background: #161820; }
        .form-group { margin-bottom: 10px; }
        input, select { padding: 8px; background: #1e2030; border: 1px solid #252840; color: white; border-radius: 4px; }
        button { padding: 10px 20px; background: #6c5ce7; color: white; border: none; border-radius: 4px; cursor: pointer; }
        #status-msg { color: #9294a8; font-size: 0.9em; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>Job Tracker</h1>
    
    <div id="add-job-form">
        <input type="text" id="company" placeholder="Company">
        <input type="text" id="position" placeholder="Position">
        <input type="text" id="location" placeholder="Location">
        <select id="status">
            <option value="Applied">Applied</option>
            <option value="Interviewing">Interviewing</option>
            <option value="Offer">Offer</option>
            <option value="Rejected">Rejected</option>
        </select>
        <button onclick="handleAddJob()">Add Job</button>
    </div>

    <div id="status-msg">Connecting to Google Sheets...</div>

    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Company</th>
                <th>Position</th>
                <th>Location</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="job-table-body">
            </tbody>
    </table>

    <script>
        const G_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwa-waYH4RSD4oFHHJXt1D8B7L0nHnWfLDAHflN3_5GmJhDamso5-MenkRFLKKIrWo0/exec";

// 1. Load data from Google Sheets immediately when page opens
window.onload = loadJobs;

async function loadJobs() {
    const statusMsg = document.getElementById('status-msg');
    statusMsg.innerText = "Fetching latest data...";
    
    try {
        const response = await fetch(G_SCRIPT_URL);
        const data = await response.json();
        renderTable(data);
        statusMsg.innerText = "Sync complete.";
    } catch (error) {
        console.error("Error:", error);
        statusMsg.innerText = "Error loading data.";
    }
}

// 2. Add a new job and send it to Google Sheets
async function handleAddJob() {
    const statusMsg = document.getElementById('status-msg');
    
    const newJob = {
        Date: new Date().toLocaleDateString(),
        Company: document.getElementById('company').value,
        Position: document.getElementById('position').value,
        Location: document.getElementById('location').value,
        Status: document.getElementById('status').value,
        Source: "", 
        Notes: "",
        Salary: ""
    };

    if (!newJob.Company || !newJob.Position) {
        alert("Please enter at least Company and Position.");
        return;
    }

    statusMsg.innerText = "Saving to Google Sheets...";

    try {
        await fetch(G_SCRIPT_URL, {
            method: "POST",
            mode: "no-cors", 
            body: JSON.stringify(newJob)
        });

        // Clear the form
        document.getElementById('company').value = "";
        document.getElementById('position').value = "";
        document.getElementById('location').value = "";
        
        statusMsg.innerText = "Saved! Refreshing list...";
        
        // Wait a moment for Google to process then refresh
        setTimeout(loadJobs, 2000);
        
    } catch (error) {
        console.error("Error:", error);
        statusMsg.innerText = "Error saving data.";
    }
}

// 3. Display the data in the table
function renderTable(data) {
    const tbody = document.getElementById('job-table-body');
    tbody.innerHTML = ""; // Clear current table

    data.forEach(job => {
        const row = `<tr>
            <td>${job.Date || ''}</td>
            <td>${job.Company || ''}</td>
            <td>${job.Position || ''}</td>
            <td>${job.Location || ''}</td>
            <td>${job.Status || ''}</td>
        </tr>`;
        tbody.innerHTML += row;
    });
}
    </script>
</body>
</html>
