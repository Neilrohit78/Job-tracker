<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker — Neil</title>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background: #0f1117; color: #e8e9f0; padding: 20px; margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        h1 { color: #6c5ce7; margin-bottom: 20px; }

        /* Form & Controls Styling */
        .controls, #add-job-form { 
            background: #161820; 
            padding: 15px; 
            border-radius: 8px; 
            margin-bottom: 15px; 
            display: flex; 
            gap: 10px; 
            flex-wrap: wrap; 
            align-items: center;
        }
        
        input, select { 
            padding: 8px 12px; 
            background: #1e2030; 
            border: 1px solid #35384e; 
            color: white; 
            border-radius: 4px; 
            font-size: 13px; 
            flex-grow: 1;
        }

        button { 
            padding: 8px 16px; 
            background: #6c5ce7; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold;
        }

        button:hover { background: #a29bfe; }

        /* Status Message */
        #status-msg { margin: 10px 0; font-size: 0.9em; color: #9294a8; font-style: italic; }

        /* Table Styling */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; background: #161820; border-radius: 8px; overflow: hidden; }
        th, td { border: 1px solid #252840; padding: 12px; text-align: left; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Explicit Column Widths for Desktop */
        th:nth-child(1) { width: 100px; } /* Date */
        th:nth-child(2) { width: 180px; } /* Company */
        th:nth-child(3) { width: 200px; } /* Position */
        th:nth-child(4) { width: 150px; } /* Location */
        th:nth-child(5) { width: 120px; } /* Status */
        th:nth-child(6) { width: 100px; } /* Actions */

        /* Buttons & Links */
        .btn-edit { background: #4b4d61; padding: 4px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; color: white; border: none; }
        .btn-link { color: #6c5ce7; text-decoration: none; font-size: 18px; margin-left: 10px; vertical-align: middle; }
        
        /* Status Colors */
        .status-applied { color: #81ecec; }
        .status-interviewing { color: #fdcb6e; }
        .status-offer { color: #55efc4; font-weight: bold; }
        .status-rejected { color: #ff7675; opacity: 0.6; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Job Tracker</h1>
        
        <div id="add-job-form">
            <input type="text" id="company" placeholder="Company Name">
            <input type="text" id="position" placeholder="Role/Position">
            <input type="text" id="location" placeholder="Location">
            <input type="text" id="source" placeholder="Link to Job (URL)">
            <select id="status">
                <option value="Applied">Applied</option>
                <option value="Interviewing">Interviewing</option>
                <option value="Offer">Offer</option>
                <option value="Rejected">Rejected</option>
            </select>
            <button onclick="handleAddJob()">Save Job</button>
        </div>

        <div id="status-msg">Initializing connection...</div>

        <div class="controls">
            <input type="text" id="search-company" placeholder="🔍 Search company or role..." oninput="applyFilter()">
            
            <select id="filter-status" onchange="applyFilter()">
                <option value="All">All Statuses</option>
                <option value="Applied">Applied</option>
                <option value="Interviewing">Interviewing</option>
                <option value="Offer">Offer</option>
                <option value="Rejected">Rejected</option>
            </select>

            <select id="filter-month" onchange="applyFilter()">
                <option value="All">All Months</option>
                <option value="0">Jan</option><option value="1">Feb</option><option value="2">Mar</option>
                <option value="3">Apr</option><option value="4">May</option><option value="5">Jun</option>
                <option value="6">Jul</option><option value="7">Aug</option><option value="8">Sep</option>
                <option value="9">Oct</option><option value="10">Nov</option><option value="11">Dec</option>
            </select>

            <select id="filter-year" onchange="applyFilter()">
                <option value="All">All Years</option>
                <option value="2024">2024</option>
                <option value="2025">2025</option>
                <option value="2026">2026</option>
            </select>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Company</th>
                        <th>Position</th>
                        <th>Location</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
