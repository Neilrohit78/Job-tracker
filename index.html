<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Job Tracker — Neil</title>
    <style>
        body { font-family: sans-serif; background: #0f1117; color: #e8e9f0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        input, select, button { padding: 10px; margin: 5px; border-radius: 4px; border: 1px solid #35384e; background: #161820; color: white; }
        button { background: #6c5ce7; cursor: pointer; font-weight: bold; border: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; table-layout: fixed; }
        th, td { border: 1px solid #252840; padding: 12px; text-align: left; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .status-applied { color: #81ecec; }
        .status-rejected { color: #ff7675; }
        #status-msg { color: #9294a8; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Job Tracker</h1>
        
        <div id="form">
            <input type="text" id="company" placeholder="Company">
            <input type="text" id="position" placeholder="Position">
            <input type="text" id="location" placeholder="Location">
            <input type="text" id="source" placeholder="Link (URL)">
            <select id="status">
                <option value="Applied">Applied</option>
                <option value="Interviewing">Interviewing</option>
                <option value="Offer">Offer</option>
                <option value="Rejected">Rejected</option>
            </select>
            <button onclick="handleAddJob()">Save Job</button>
        </div>

        <div id="status-msg">App Status: Loading Script...</div>

        <div id="filters">
            <input type="text" id="search" placeholder="Filter Company..." oninput="renderTable(allJobs)">
        </div>

        <table>
            <thead>
                <tr>
                    <th style="width: 100px;">Date</th>
                    <th>Company</th>
                    <th>Position</th>
                    <th>Location</th>
                    <th>Status</th>
                    <th style="width: 80px;">Link</th>
                </tr>
            </thead>
            <tbody id="job-table-body"></tbody>
        </table>
    </div>

    <script>
        // ALERT TO TEST IF SCRIPT IS RUNNING
        console.log("Script Started");
        
        const G_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwa-waYH4RSD4oFHHJXt1D8B7L0nHnWfLDAHflN3_5GmJhDamso5-MenkRFLKKIrWo0/exec";
        let allJobs = [];

        async function loadJobs() {
            const msg = document.getElementById('status-msg');
            msg.innerText = "App Status: Fetching data from Google...";
            try {
                const res = await fetch(G_SCRIPT_URL);
                allJobs = await res.json();
                renderTable(allJobs);
                msg.innerText = "App Status: ✓ Connected (" + allJobs.length + " jobs)";
            } catch (e) {
                msg.innerText = "App Status: ❌ Connection Error. Check Script URL.";
                console.error(e);
            }
        }

        function renderTable(data) {
            const search = document.getElementById('search').value.toLowerCase();
            const tbody = document.getElementById('job-table-body');
            const filtered = data.filter(j => j.Company.toLowerCase().includes(search));
            
            tbody.innerHTML = filtered.map(j => `
                <tr>
                    <td>${j.Date ? new Date(j.Date).toLocaleDateString('en-GB') : ''}</td>
                    <td>${j.Company}</td>
                    <td>${j.Position}</td>
                    <td>${j.Location}</td>
                    <td class="status-${(j.Status || '').toLowerCase()}">${j.Status}</td>
                    <td>${j.Source ? `<a href="${j.Source}" target="_blank" style="color:#6c5ce7">🔗</a>` : ''}</td>
                </tr>
            `).join('');
        }

        async function handleAddJob() {
            const btn = document.querySelector('button');
            btn.innerText = "Saving...";
            const newJob = {
                Date: new Date().toISOString(),
                Company: document.getElementById('company').value,
                Position: document.getElementById('position').value,
                Location: document.getElementById('location').value,
                Status: document.getElementById('status').value,
                Source: document.getElementById('source').value
            };
            
            await fetch(G_SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(newJob) });
            btn.innerText = "Save Job";
            loadJobs();
        }

        window.onload = loadJobs;
    </script>
</body>
</html>
