<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Hub — Neil</title>
    <style>
        :root { --bg: #0f111a; --card-bg: #161925; --primary: #6c5ce7; --text: #e8e9f0; --border: #2d3142; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .container { max-width: 1100px; margin: 0 auto; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        input, select { background: #1e2235; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; outline: none; flex: 1; min-width: 150px; }
        button { padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; transition: 0.2s; background: var(--primary); color: white; }
        #status-msg { font-weight: bold; margin-bottom: 20px; color: #9294a8; }
        .table-wrapper { border-radius: 12px; border: 1px solid var(--border); overflow-x: auto; background: var(--card-bg); }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th, td { padding: 14px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        th { background: #1c2030; color: #9294a8; text-transform: uppercase; font-size: 11px; }
        .pill { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; border: 1px solid; }
        .status-applied { color: #81ecec; } .status-interviewing { color: #fdcb6e; } .status-offer { color: #55efc4; } .status-rejected { color: #ff7675; opacity: 0.6; }
        .btn-edit { background: transparent; color: #9294a8; border: 1px solid #4b4d61; padding: 4px 8px; border-radius: 4px; font-size: 11px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Career Hub</h1>
        <div class="card" id="add-job-form">
            <input type="text" id="company" placeholder="Company">
            <input type="text" id="position" placeholder="Role">
            <input type="text" id="location" placeholder="Location">
            <input type="text" id="source" placeholder="Link (URL)">
            <select id="status"><option>Applied</option><option>Interviewing</option><option>Offer</option><option>Rejected</option></select>
            <button onclick="handleAddJob()" id="save-btn">Save Job</button>
        </div>
        <div id="status-msg">App Status: Initializing...</div>
        <div class="card">
            <input type="text" id="search-box" placeholder="Search..." oninput="applyFilter()">
            <button onclick="clearFilters()" style="background:#2d3142">Clear</button>
        </div>
        <div class="table-wrapper">
            <table>
                <thead><tr><th style="width:100px">Date</th><th>Company</th><th>Position</th><th>Location</th><th>Status</th><th style="width:100px">Actions</th></tr></thead>
                <tbody id="job-table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        // PASTE YOUR URL CAREFULLY BETWEEN THE QUOTES BELOW
        const G_SCRIPT_URL = "PASTE_YOUR_FULL_GOOGLE_SCRIPT_URL_HERE";
        
        let allJobs = [];

        window.onload = function() {
            if (G_SCRIPT_URL.includes("https://script.google.com/macros/s/AKfycbwa-waYH4RSD4oFHHJXt1D8B7L0nHnWfLDAHflN3_5GmJhDamso5-MenkRFLKKIrWo0/exec")) {
                document.getElementById('status-msg').innerText = "❌ ERROR: You haven't pasted your Script URL in the code!";
            } else {
                loadJobs();
            }
        };

        async function loadJobs() {
            const msg = document.getElementById('status-msg');
            msg.innerText = "App Status: ⏳ Connecting to Google...";
            try {
                const response = await fetch(G_SCRIPT_URL);
                allJobs = await response.json();
                applyFilter();
                msg.innerText = "App Status: ✓ Sync Complete (" + allJobs.length + " entries)";
            } catch (e) { 
                msg.innerText = "App Status: ❌ Sync Failed. Check Script Deployment."; 
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('job-table-body');
            tbody.innerHTML = data.map((job) => `
                <tr>
                    <td>${formatDate(job.Date)}</td>
                    <td><strong>${job.Company}</strong></td>
                    <td>${job.Position}</td>
                    <td>${job.Location || '—'}</td>
                    <td><span class="pill status-${(job.Status || '').toLowerCase()}">${job.Status || 'Applied'}</span></td>
                    <td>
                        <button class="btn-edit" onclick="startEdit('${job.Company}', '${job.Position}', '${job.Status}', '${job.Location || ''}', '${job.Source || ''}')">Edit</button>
                    </td>
                </tr>
            `).join('');
        }

        function applyFilter() {
            const searchVal = document.getElementById('search-box').value.toLowerCase();
            const filtered = allJobs.filter(j => j.Company.toLowerCase().includes(searchVal) || j.Position.toLowerCase().includes(searchVal));
            renderTable(filtered);
        }

        function clearFilters() {
            document.getElementById('search-box').value = "";
            applyFilter();
        }

        function formatDate(dateStr) {
            if (!dateStr) return "";
            const d = new Date(dateStr);
            return isNaN(d) ? dateStr : d.toLocaleDateString('en-GB');
        }

        async function handleAddJob() {
            const btn = document.getElementById('save-btn');
            btn.innerText = "Saving...";
            const newJob = {
                Date: new Date().toISOString(),
                Company: document.getElementById('company').value,
                Position: document.getElementById('position').value,
                Location: document.getElementById('location').value,
                Status: document.getElementById('status').value,
                Source: document.getElementById('source').value
            };
            if (!newJob.Company) return alert("Enter Company Name");
            await fetch(G_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwa-waYH4RSD4oFHHJXt1D8B7L0nHnWfLDAHflN3_5GmJhDamso5-MenkRFLKKIrWo0/exec", { method: "POST", mode: "no-cors", body: JSON.stringify(newJob) });
            btn.innerText = "Save Job";
            loadJobs();
        }
        
        function startEdit(company, position, status, location, source) {
            document.getElementById('company').value = company;
            document.getElementById('position').value = position;
            document.getElementById('status').value = status;
            document.getElementById('location').value = location;
            document.getElementById('source').value = source;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
